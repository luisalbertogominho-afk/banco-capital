<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Capital</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loginScreen" class="screen">
        <div class="login-box">
            <h1>🏦 Banco Capital</h1>

            <input type="text" id="username" placeholder="Usuário">

            <input type="password" id="password" placeholder="Senha">

            <button onclick="login()">Entrar</button>

            <button onclick="register()">Criar Conta</button>
        </div>
    </div>

    <div id="appScreen" class="screen hidden">

        <header>

            <h1>🏦 Banco Capital</h1>

            <div class="user-info">
                <span id="userDisplay"></span>
                <button onclick="logout()">Sair</button>
            </div>

        </header>

        <main>

            <div class="dashboard">

                <div class="card">
                    <h3>Saldo</h3>
                    <h1 id="saldo">0</h1>
                </div>

                <div class="card">
                    <h3>Número da Conta</h3>
                    <h2 id="contaNumero"></h2>
                </div>

            </div>

            <div class="section">

                <h2>💸 Transferência</h2>

                <input id="contaDestino" placeholder="Conta destino">

                <input id="valorTransferencia" type="number" placeholder="Valor">

                <button onclick="transferir()">Transferir</button>

            </div>

            <div class="section">

                <h2>📈 Empréstimo</h2>

                <input id="valorEmprestimo" type="number" placeholder="Valor">

                <button onclick="emprestimo()">Solicitar</button>

            </div>

            <div class="section">

                <h2>💰 Poupança</h2>

                <input id="valorPoupanca" type="number" placeholder="Valor">

                <button onclick="guardarPoupanca()">Guardar</button>

            </div>

            <div class="section">

                <h2>🏆 Ranking</h2>

                <ul id="ranking"></ul>

            </div>

            <div class="section">

                <h2>📜 Histórico</h2>

                <ul id="historico"></ul>

            </div>

            <div id="adminPanel" class="section hidden">

                <h2>👑 Painel Admin</h2>

                <input id="adminUser" placeholder="Usuário">

                <input id="adminValor" type="number" placeholder="Valor">

                <button onclick="giveMoney()">
                    Dar Dinheiro
                </button>

            </div>

        </main>

    </div>

    <script src="script.js"></script>

</body>
</html>
