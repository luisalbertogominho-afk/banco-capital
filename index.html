<!DOCTYPE html>
<html>
<head>
  <title>Banco Capital PRO</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    .login, .app {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      width: 100%;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .topbar {
      background: #111827;
      padding: 15px;
      font-size: 18px;
    }

    .admin {
      background: #7c3aed;
    }

    ul {
      list-style: none;
      padding: 0;
    }
  </style>
</head>

<body>

<div class="topbar">
  🏦 Banco Capital PRO
</div>

<!-- LOGIN -->
<div class="login active" id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Criar Conta</button>
</div>

<!-- APP -->
<div class="app" id="app">

  <h2>Bem-vindo, <span id="nome"></span></h2>

  <div class="card">
    <h3>💰 Saldo</h3>
    <h1>$<span id="saldo">0</span></h1>
  </div>

  <div class="card">
    <h3>💸 Transferência</h3>
    <input id="toUser" placeholder="Usuário destino">
    <input id="valor" type="number" placeholder="Valor">
    <button onclick="transferir()">Transferir</button>
  </div>

  <div class="card">
    <h3>➕ Depósito</h3>
    <input id="dep" type="number" placeholder="Valor">
    <button onclick="depositar()">Depositar</button>
  </div>

  <div class="card">
    <h3>📜 Histórico</h3>
    <ul id="hist"></ul>
  </div>

  <div class="card admin">
    <h3>🛠 Admin (simples)</h3>
    <input id="admUser" placeholder="Usuário">
    <input id="admValue" type="number" placeholder="Dar dinheiro">
    <button onclick="giveMoney()">Dar dinheiro</button>
  </div>

  <button onclick="logout()">Sair</button>

</div>

<script>
let current = null;

function getUsers(){
  return JSON.parse(localStorage.getItem("bank") || "{}");
}

function saveUsers(data){
  localStorage.setItem("bank", JSON.stringify(data));
}

function register(){
  let u = user.value;
  let p = pass.value;

  let db = getUsers();

  if(db[u]) return alert("Usuário já existe!");

  db[u] = {
    pass: p,
    saldo: 1000,
    hist: []
  };

  saveUsers(db);
  alert("Conta criada!");
}

function login(){
  let u = user.value;
  let p = pass.value;

  let db = getUsers();

  if(db[u] && db[u].pass === p){
    current = u;
    login.classList.remove("active");
    app.classList.add("active");

    nome.innerText = u;
    update();
  } else {
    alert("Login inválido!");
  }
}

function update(){
  let db = getUsers();
  saldo.innerText = db[current].saldo;

  hist.innerHTML = "";
  db[current].hist.forEach(h=>{
    let li = document.createElement("li");
    li.innerText = h;
    hist.appendChild(li);
  });
}

function depositar(){
  let v = Number(dep.value);
  let db = getUsers();

  db[current].saldo += v;
  db[current].hist.push("Depósito +" + v);

  saveUsers(db);
  update();
}

function transferir(){
  let v = Number(valor.value);
  let t = toUser.value;

  let db = getUsers();

  if(!db[t]) return alert("Usuário não existe!");
  if(db[current].saldo < v) return alert("Saldo insuficiente!");

  db[current].saldo -= v;
  db[t].saldo += v;

  db[current].hist.push("Transferência -" + v + " para " + t);
  db[t].hist.push("Recebeu +" + v + " de " + current);

  saveUsers(db);
  update();
}

function giveMoney(){
  let u = admUser.value;
  let v = Number(admValue.value);

  let db = getUsers();

  if(!db[u]) return alert("Usuário não existe!");

  db[u].saldo += v;
  db[u].hist.push("Admin + " + v);

  saveUsers(db);
  alert("Dinheiro enviado!");
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
